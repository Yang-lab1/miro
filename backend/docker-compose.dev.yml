services:
  postgres:
    image: postgres:16-alpine
    container_name: miro-backend-postgres
    environment:
      POSTGRES_DB: miro
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d miro"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - miro-postgres-data:/var/lib/postgresql/data

volumes:
  miro-postgres-data:
